apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentinel
  labels:
    app: sentinel
spec:
  # Single replica only. Persistence now lives in ParadeDB (Postgres), but the
  # pod still holds a single Slack Socket-Mode connection and a shared Chrome
  # profile under /app/data on a ReadWriteOnce PVC — two pods would
  # double-process Slack events and corrupt the Chrome profile.
  replicas: 1
  strategy:
    # Recreate (not RollingUpdate): tear down the old pod before starting the
    # new one so two pods never hold the same RWO volume / socket at once.
    type: Recreate
  selector:
    matchLabels:
      app: sentinel
  template:
    metadata:
      labels:
        app: sentinel
    spec:
      serviceAccountName: sentinel
      # ECR pull credentials. Provide an imagePullSecret named `ecr-registry`
      # in the namespace, OR remove this and use node IAM / IRSA for ECR.
      imagePullSecrets:
        - name: ecr-registry
      # fsGroup makes the mounted PVC (the Chrome profile) group-writable by the
      # non-root runtime user (uid 1000, pwuser). runAsNonRoot / runAsUser pin
      # the pwuser identity from the Playwright base image.
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      # >= the 25s in-flight drain + the 10s bounded Slack-stop, with headroom
      # (see src/shutdown.ts). K8s default is 30s, which is too tight.
      terminationGracePeriodSeconds: 40
      # Block startup until ParadeDB accepts connections — the bot runs schema
      # migrations on boot (src/state/db.ts initDb) and would crashloop if the
      # DB isn't up yet.
      initContainers:
        - name: wait-for-paradedb
          image: paradedb/paradedb:latest
          command:
            - /bin/sh
            - -c
            - 'until pg_isready -d "$DATABASE_URL"; do echo "waiting for paradedb..."; sleep 2; done'
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: sentinel-secrets
                  key: DATABASE_URL
      containers:
        - name: sentinel
          # Image NAME `sentinel` — the kustomize overlay's `images:` transformer
          # rewrites it to the real ECR repo + tag (GitOps sets the tag).
          image: sentinel:latest
          ports:
            - name: http
              containerPort: 8930
          envFrom:
            # Mandatory + optional secret env (tokens, API keys, Google creds).
            - secretRef:
                name: sentinel-secrets
            # Non-secret tunables (LOG_LEVEL, PG_POOL_MAX, feature gates, etc.).
            # DATABASE_URL is a secret key, pulled in via the secretRef above.
            - configMapRef:
                name: sentinel-config
          # Startup probe gates liveness/readiness until the app is actually up
          # (Slack connect can be slow). 5s × 36 ≈ 180s budget; prevents liveness
          # from killing a slow-but-healthy boot.
          startupProbe:
            httpGet:
              path: /ready
              port: 8930
            periodSeconds: 5
            failureThreshold: 36
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8930
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 8930
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            # Sized for up to 3 concurrent agent replies — each holding its
            # per-request stdio MCP servers — plus a possible Chrome (Meet bot).
            # Tune after observing load.
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "3Gi"
          volumeMounts:
            - name: data
              mountPath: /app/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: sentinel-data
