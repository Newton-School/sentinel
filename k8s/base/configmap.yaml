apiVersion: v1
kind: ConfigMap
metadata:
  name: sentinel-config
  labels:
    app: sentinel
data:
  # Non-secret tunables only. Secrets live in the sentinel-secrets Secret
  # (see secret.example.yaml). Merged into the container env via envFrom.
  LOG_LEVEL: "info"
  NODE_ENV: "production"
  # Keep the SQLite DB on the persistent volume mounted at /app/data so it
  # survives pod restarts/rollouts.
  SQLITE_DB_PATH: "/app/data/sentinel.db"
  HEALTH_CHECK_PORT: "8930"
  # Company-brain / memory feature gates (read from process.env at runtime).
  # Both require an OpenAI/embedding key in the Secret to actually do anything.
  MEMORY_ENTITY_GRAPH: "1"
  MEMORY_EMBEDDINGS: "1"
  # Access gate: the Slack user-group handle whose members may use the bot.
  SENTINEL_ACCESS_GROUP_HANDLE: "sentinel-access-group"
  # Optional: pin a stronger model for the analytics route, e.g.:
  # ANALYTICS_CLAUDE_MODEL: "claude-opus-4-8"
