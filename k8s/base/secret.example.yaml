# TEMPLATE ONLY — DO NOT COMMIT REAL SECRETS.
#
# Copy to a private location, replace every REPLACE_ME, and apply out-of-band
# (or manage via sealed-secrets / external-secrets):
#   cp k8s/base/secret.example.yaml /tmp/sentinel-secret.yaml
#   $EDITOR /tmp/sentinel-secret.yaml
#   kubectl -n sentinel-staging apply -f /tmp/sentinel-secret.yaml
#
# Delete optional keys you don't use rather than leaving them as REPLACE_ME.
apiVersion: v1
kind: Secret
metadata:
  name: sentinel-secrets
  labels:
    app: sentinel
type: Opaque
stringData:
  # --- Mandatory (the pod crashes at boot without these — see src/config.ts) ---
  SLACK_BOT_TOKEN: "REPLACE_ME"
  SLACK_APP_TOKEN: "REPLACE_ME"
  BOT_USER_ID: "REPLACE_ME"
  ALLOWED_USER_IDS: "REPLACE_ME"
  # --- Access gate (without these the gate denies everyone but the owner) ---
  SENTINEL_OWNER_USER_ID: "REPLACE_ME"
  # --- Analytics + memory (pod boots without them, but analytics routing,
  #     embeddings, and fact extraction silently no-op) ---
  OPENAI_API_KEY: "REPLACE_ME"
  MEMORY_EMBEDDING_API_KEY: "REPLACE_ME"
  METABASE_URL: "REPLACE_ME"
  METABASE_API_KEY: "REPLACE_ME"
  # --- Optional integrations ---
  METABASE_USERNAME: "REPLACE_ME"
  METABASE_PASSWORD: "REPLACE_ME"
  GITHUB_TOKEN: "REPLACE_ME"
  NOTION_API_KEY: "REPLACE_ME"
  SLACK_USER_TOKEN: "REPLACE_ME"
  GOOGLE_CLIENT_ID: "REPLACE_ME"
  GOOGLE_CLIENT_SECRET: "REPLACE_ME"
  GOOGLE_REFRESH_TOKEN: "REPLACE_ME"
