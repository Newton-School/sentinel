apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentinel
  labels:
    app: sentinel
spec:
  # Single replica only. Sentinel stores SQLite (single-writer, WAL) and a
  # shared persistent Chrome profile under /app/data on a ReadWriteOnce PVC.
  # Two pods on the same volume would corrupt the DB / Chrome profile.
  replicas: 1
  strategy:
    # Recreate (not RollingUpdate): tear down the old pod before starting the
    # new one so two pods never hold the same RWO volume at once.
    type: Recreate
  selector:
    matchLabels:
      app: sentinel
  template:
    metadata:
      labels:
        app: sentinel
    spec:
      containers:
        - name: sentinel
          # PLACEHOLDER_IMAGE_URI is substituted at deploy time from
          # imageDetail.json's "ImageURI" (the sha-pinned ECR image written by
          # buildspec.yml). See k8s/README.md for the exact command.
          image: PLACEHOLDER_IMAGE_URI
          ports:
            - name: http
              containerPort: 8930
          envFrom:
            # Mandatory + optional secret env (tokens, API keys, Google creds).
            - secretRef:
                name: sentinel-secrets
            # Non-secret tunables (LOG_LEVEL, SQLITE_DB_PATH, HEALTH_CHECK_PORT).
            - configMapRef:
                name: sentinel-config
          livenessProbe:
            httpGet:
              path: /health
              port: 8930
            # Docker HEALTHCHECK uses a 10s start-period; give the process a
            # little more headroom before the first liveness probe.
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 8930
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "2Gi"
          volumeMounts:
            - name: data
              mountPath: /app/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: sentinel-data
