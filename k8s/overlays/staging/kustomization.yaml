apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Staging overlay. Apply with `kubectl apply -k k8s/overlays/staging`, or point
# your GitOps app (ArgoCD/flux) at this path.
namespace: sentinel-staging

resources:
  - ../../base

# Rewrites the base image NAME `sentinel` (used by both the app container and
# the seed-claude-creds init container) to the real ECR image. GitOps
# (ArgoCD image-updater / flux) overrides `newTag` to the deployed SHA.
images:
  - name: sentinel
    newName: REPLACE_WITH_ECR_REPO  # e.g. 123456789012.dkr.ecr.ap-south-1.amazonaws.com/sentinel
    newTag: staging

# Real Secrets live in the sentinel-staging namespace, applied out-of-band /
# via sealed-secrets — NOT generated here:
#   - sentinel-secrets   (from k8s/base/secret.example.yaml)
#   - claude-cli-creds   (from a logged-in ~/.claude — see k8s/README.md)
#   - ecr-registry       (imagePullSecret, unless using node IAM/IRSA)
