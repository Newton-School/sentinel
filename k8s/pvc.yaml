apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: sentinel-data
  labels:
    app: sentinel
spec:
  # ReadWriteOnce: the volume is mounted by a single pod. Sentinel's SQLite DB
  # (single-writer WAL) and the shared Chrome profile under /app/data must not
  # be accessed by two pods concurrently — hence RWO + a single-replica,
  # Recreate-strategy Deployment.
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
