version: 0.2

env:
  variables:
    ECR_REPO: sentinel
    NODE_VERSION: "20"
    # The test suite runs against Postgres (pgvector for embeddings). pg_search
    # BM25 is absent on this image, so recall uses the portable ts_rank path —
    # the same path validated locally. True BM25 is exercised on ParadeDB itself.
    TEST_PG_BASE_URL: "postgres://postgres:postgres@localhost:5432"

phases:
  install:
    runtime-versions:
      nodejs: 20
    commands:
      - npm ci
      # Postgres + pgvector for the test suite (Docker is available — the build
      # phase below uses it). Mapped to localhost:5432 for TEST_PG_BASE_URL.
      - echo "Starting Postgres (pgvector) for tests..."
      - docker run -d --name testpg -p 5432:5432 -e POSTGRES_PASSWORD=postgres pgvector/pgvector:pg16
      - for i in $(seq 1 30); do docker exec testpg pg_isready -U postgres >/dev/null 2>&1 && break; echo "waiting for postgres..."; sleep 2; done

  pre_build:
    commands:
      - echo "Building (emits dist/ — MCP servers run from dist/mcp/*.js and npm start runs dist/index.js)..."
      - npm run build
      - echo "Running tests..."
      - npm test
      - echo "Logging in to ECR..."
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com

  build:
    commands:
      - echo "Building Docker image..."
      - IMAGE_URI=$AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$ECR_REPO
      - docker build -t $IMAGE_URI:$CODEBUILD_RESOLVED_SOURCE_VERSION -t $IMAGE_URI:latest .

  post_build:
    commands:
      - echo "Pushing to ECR..."
      - docker push $IMAGE_URI:$CODEBUILD_RESOLVED_SOURCE_VERSION
      - docker push $IMAGE_URI:latest
      - echo "Writing image definition for K8s deployment..."
      - printf '{"ImageURI":"%s"}' $IMAGE_URI:$CODEBUILD_RESOLVED_SOURCE_VERSION > imageDetail.json

artifacts:
  files:
    - imageDetail.json
    - k8s/**/*

cache:
  paths:
    - node_modules/**/*
